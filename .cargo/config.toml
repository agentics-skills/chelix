# Cross-compilation config: build a static musl Linux x86_64 binary on macOS.
# Uses the homebrew musl-cross toolchain (x86_64-linux-musl-*).
[target.x86_64-unknown-linux-musl]
linker = "x86_64-linux-musl-gcc"
rustflags = ["-C", "target-feature=+crt-static"]

# Native C/C++ build tooling for any `cc`/`cmake`-based crates (e.g. aws-lc-rs).
[env]
CC_x86_64_unknown_linux_musl = "x86_64-linux-musl-gcc"
CXX_x86_64_unknown_linux_musl = "x86_64-linux-musl-g++"
AR_x86_64_unknown_linux_musl = "x86_64-linux-musl-ar"
CMAKE_C_COMPILER = "x86_64-linux-musl-gcc"
CMAKE_CXX_COMPILER = "x86_64-linux-musl-g++"
