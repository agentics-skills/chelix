[package]
edition.workspace    = true
name                 = "chelix-web"
repository.workspace = true
version.workspace    = true

[dependencies]
askama          = { workspace = true }
axum            = { workspace = true }
axum-extra      = { features = ["cookie"], workspace = true }
base64          = { workspace = true }
chelix-channels = { workspace = true }
chelix-config   = { workspace = true }
chelix-cron     = { workspace = true }
chelix-gateway  = { workspace = true }
chelix-httpd    = { workspace = true }
chelix-media    = { workspace = true }
chelix-skills   = { workspace = true }
chelix-tools    = { workspace = true }
chrono          = { features = ["serde"], workspace = true }
futures         = { workspace = true }
gix             = { workspace = true }
include_dir     = { optional = true, workspace = true }
portable-pty    = { workspace = true }
secrecy         = { workspace = true }
serde           = { workspace = true }
serde_json      = { workspace = true }
sysinfo         = { workspace = true }
thiserror       = { workspace = true }
tokio           = { workspace = true }
tokio-util      = { workspace = true }
tracing         = { workspace = true }
url             = { workspace = true }
uuid            = { workspace = true }
which           = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }

[features]
agent              = ["chelix-gateway/agent"]
bundled-skills     = ["chelix-skills/bundled-skills"]
default            = ["embedded-assets"]
embedded-assets    = ["dep:include_dir"]
graphql            = ["chelix-gateway/graphql", "chelix-httpd/graphql"]
mdns               = ["chelix-httpd/mdns"]
metrics            = ["chelix-httpd/metrics"]
push-notifications = ["chelix-httpd/push-notifications"]
slack              = ["chelix-httpd/slack"]
tls                = ["chelix-httpd/tls"]
vault              = ["chelix-httpd/vault"]
voice              = []
web-ui             = ["chelix-httpd/web-ui"]

[lints]
workspace = true
