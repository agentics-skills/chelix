[package]
edition.workspace = true
name              = "chelix-tools"
version.workspace = true

[features]
bundled-skills        = ["chelix-skills/bundled-skills"]
default               = ["firecrawl", "fs-tools", "metrics", "provider-openai-codex", "wasm"]
embedded-wasm         = []
firecrawl             = []
provider-openai-codex = ["chelix-providers/provider-openai-codex"]
# Native filesystem tools (Read, Write, Edit, MultiEdit, Glob, Grep).
# See agentics-skills/chelix#657. Default-on; build with
# --no-default-features to omit them from minimal builds.
fs-tools = [
  "dep:globset",
  "dep:grep-matcher",
  "dep:grep-regex",
  "dep:grep-searcher",
  "dep:ignore",
  "dep:pdf-extract",
]
metrics = ["dep:chelix-metrics"]
wasm = ["dep:wasmtime", "dep:wasmtime-wasi", "wasmtime/component-model"]

[dependencies]
anyhow                = { workspace = true }
async-trait           = { workspace = true }
base64                = { workspace = true }
bytes                 = { workspace = true }
chelix-agents         = { workspace = true }
chelix-browser        = { workspace = true }
chelix-common         = { workspace = true }
chelix-config         = { workspace = true }
chelix-cron           = { workspace = true }
chelix-media          = { workspace = true }
chelix-metrics        = { optional = true, workspace = true }
chelix-providers      = { workspace = true }
chelix-protocol       = { workspace = true }
chelix-service-traits = { workspace = true }
chelix-sessions       = { workspace = true }
chelix-skills         = { workspace = true }
flate2                = { workspace = true }
futures               = { workspace = true }
globset               = { optional = true, workspace = true }
grep-matcher          = { optional = true, workspace = true }
grep-regex            = { optional = true, workspace = true }
grep-searcher         = { optional = true, workspace = true }
html2text             = { workspace = true }
ignore                = { optional = true, workspace = true }
image                 = { workspace = true }
ipnet                 = { workspace = true }
pdf-extract           = { optional = true, workspace = true }
regex                 = { workspace = true }
reqwest               = { features = ["blocking"], workspace = true }
secrecy               = { workspace = true }
serde                 = { workspace = true }
serde_json            = { workspace = true }
sha2                  = { workspace = true }
shell-words           = { workspace = true }
sqlx                  = { workspace = true }
tar                   = { workspace = true }
tempfile              = { workspace = true }
thiserror             = { workspace = true }
time                  = { workspace = true }
tokio                 = { workspace = true }
tracing               = { workspace = true }
url                   = { workspace = true }
uuid                  = { workspace = true }
wasmtime              = { optional = true, workspace = true }
wasmtime-wasi         = { optional = true, workspace = true }
which                 = { workspace = true }

[dev-dependencies]
mockito      = { workspace = true }
rstest       = { workspace = true }
tokio        = { features = ["macros", "rt-multi-thread"], workspace = true }
tokio-stream = { workspace = true }

[lints]
workspace = true
