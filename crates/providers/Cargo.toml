[package]
edition.workspace    = true
name                 = "chelix-providers"
repository.workspace = true
version.workspace    = true

[features]
default                 = ["metrics", "provider-async-openai", "provider-genai"]
metrics                 = ["dep:chelix-metrics"]
provider-async-openai   = ["dep:async-openai"]
provider-genai          = ["dep:genai"]
provider-github-copilot = ["dep:chelix-oauth"]
provider-kimi-code      = ["dep:chelix-oauth"]
provider-openai-codex   = ["dep:base64", "dep:chelix-oauth"]

[dependencies]
anyhow            = { workspace = true }
async-stream      = { workspace = true }
async-trait       = { workspace = true }
chelix-agents     = { path = "../agents" }
chelix-common     = { workspace = true }
chelix-config     = { workspace = true }
futures           = { workspace = true }
http              = { workspace = true }
json_schema_ast   = { workspace = true }
reqwest           = { workspace = true }
schemars          = { workspace = true }
secrecy           = { workspace = true }
serde             = { workspace = true }
serde_json        = { workspace = true }
thiserror         = { workspace = true }
tokio             = { workspace = true }
tokio-stream      = { workspace = true }
tokio-tungstenite = { workspace = true }
tracing           = { workspace = true }

# Optional LLM provider crates
async-openai   = { optional = true, workspace = true }
base64         = { optional = true, workspace = true }
chelix-metrics = { optional = true, workspace = true }
chelix-oauth   = { optional = true, workspace = true }
genai          = { optional = true, workspace = true }

[dev-dependencies]
axum     = { workspace = true }
http     = { workspace = true }
tempfile = { workspace = true }
toml     = { workspace = true }

[lints]
workspace = true
